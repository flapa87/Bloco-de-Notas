<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes — Salvo Localmente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #e8e8ed;
            --bg-hover: rgba(0, 0, 0, 0.03);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --accent-light: rgba(0, 113, 227, 0.08);
            --border: rgba(0, 0, 0, 0.06);
            --border-light: rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --sidebar-width: 340px;
            --header-height: 56px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-primary);
            box-shadow: var(--shadow-lg);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
        }

        .brand-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .storage-info {
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .storage-info.saved {
            color: var(--accent);
            background: var(--accent-light);
        }

        .new-note-btn {
            width: 100%;
            padding: 10px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px rgba(0, 113, 227, 0.2);
        }

        .new-note-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .search-container {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .search-wrapper { position: relative; }

        .search-input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            background: var(--bg-primary);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .note-item {
            padding: 14px 16px;
            margin: 4px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            position: relative;
        }

        .note-item:hover { background: var(--bg-hover); }

        .note-item.active {
            background: var(--bg-primary);
            border-color: var(--border);
            box-shadow: var(--shadow-sm);
        }

        .note-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-item-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .note-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .note-item-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
        }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border-light);
            font-size: 12px;
            color: var(--text-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .auto-save-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .auto-save-indicator.saving::after {
            content: "";
            width: 12px;
            height: 12px;
            border: 2px solid var(--text-tertiary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }

        .toolbar {
            height: var(--header-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .toolbar-left { display: flex; align-items: center; gap: 16px; }
        .toolbar-right { display: flex; align-items: center; gap: 6px; }

        .menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .menu-btn:hover { background: var(--bg-hover); }

        .breadcrumb {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .breadcrumb-current { color: var(--text-primary); font-weight: 600; }

        .tool-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tool-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
        }

        .tool-btn.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tool-btn.primary:hover { background: var(--accent-hover); }

        .tool-btn.danger:hover {
            background: #fee2e2;
            color: #dc2626;
            border-color: #fecaca;
        }

        .tool-separator {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        .editor-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .editor-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 40px 80px;
            min-height: 100%;
        }

        .title-input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .title-input {
            width: 100%;
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
            border: none;
            outline: none;
            background: transparent;
            letter-spacing: -0.8px;
            line-height: 1.2;
            font-family: inherit;
            padding: 0;
            resize: none;
            overflow: hidden;
            min-height: 56px;
        }

        .title-input::placeholder { color: var(--text-tertiary); opacity: 0.6; }

        .title-hint {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--text-tertiary);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .title-input:focus + .title-hint { opacity: 1; }

        .content-editor {
            width: 100%;
            min-height: 400px;
            font-size: 17px;
            line-height: 1.7;
            color: var(--text-primary);
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            padding: 0;
        }

        .content-editor::placeholder { color: var(--text-tertiary); opacity: 0.5; }

        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-tertiary);
            padding: 40px;
        }

        .empty-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            box-shadow: var(--shadow-sm);
        }

        .empty-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .empty-action {
            margin-top: 24px;
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .empty-action:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .status-bar {
            height: 40px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 12px;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
        }

        .status-left { display: flex; gap: 20px; }

        .status-item { display: flex; align-items: center; gap: 6px; }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }

        .toast {
            background: rgba(29, 29, 31, 0.95);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast.hide { animation: slideOut 0.2s ease forwards; }

        @keyframes slideOut { to { opacity: 0; transform: translateX(10px); } }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: flex !important; }
            .toolbar-right { gap: 4px; }
            .tool-btn { padding: 6px 8px; font-size: 12px; }
            .tool-btn span:not(:first-child) { display: none; }
            .editor-wrapper { padding: 32px 24px 60px; }
            .title-input { font-size: 32px; }
            .content-editor { font-size: 16px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-icon">◉</div>
                    <div class="brand-text">Notes</div>
                </div>

                <!-- INFO DE ARMAZENAMENTO LOCAL -->
                <div class="storage-info" id="storageInfo">
                    <span>💾</span>
                    <span>Salvo no navegador</span>
                </div>

                <button class="new-note-btn" onclick="createNewNote()">
                    <span>+</span>
                    <span>Nova Nota</span>
                </button>
            </div>

            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Buscar notas..." id="searchInput">
                </div>
            </div>

            <div class="notes-list" id="notesList"></div>

            <div class="sidebar-footer">
                <span id="notesCount">0 notas</span>
                <div class="auto-save-indicator" id="autoSaveIndicator">
                    <span>💾 localStorage</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                    <div class="breadcrumb">
                        <span>Minhas Notas</span>
                        <span style="margin: 0 8px; opacity: 0.3;">/</span>
                        <span class="breadcrumb-current" id="breadcrumbTitle">Selecione uma nota</span>
                    </div>
                </div>
                <div class="toolbar-right">
                    <button class="tool-btn" onclick="selectAllContent()" title="Selecionar tudo">
                        <span>☐</span>
                        <span>Selecionar</span>
                    </button>
                    <button class="tool-btn" onclick="copyContent()" title="Copiar">
                        <span>📋</span>
                        <span>Copiar</span>
                    </button>
                    <button class="tool-btn" onclick="pasteContent()" title="Colar">
                        <span>📌</span>
                        <span>Colar</span>
                    </button>

                    <div class="tool-separator"></div>

                    <button class="tool-btn" onclick="downloadNote()" title="Exportar">
                        <span>⬇️</span>
                        <span>Exportar</span>
                    </button>
                    <button class="tool-btn" onclick="duplicateNote()" title="Duplicar">
                        <span>📄</span>
                        <span>Duplicar</span>
                    </button>

                    <div class="tool-separator"></div>

                    <button class="tool-btn danger" onclick="deleteNote()" title="Excluir">
                        <span>🗑️</span>
                    </button>
                </div>
            </div>

            <div class="editor-container" id="editorContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">◉</div>
                    <div class="empty-title">Suas notas organizadas</div>
                    <div class="empty-subtitle">Crie uma nova nota para começar. Tudo é salvo automaticamente no navegador.</div>
                    <button class="empty-action" onclick="createNewNote()">Criar Nova Nota</button>
                </div>

                <div class="editor-wrapper" id="editorWrapper" style="display: none;">
                    <div class="title-input-wrapper">
                        <textarea class="title-input" id="titleInput" placeholder="Título da nota" rows="1"></textarea>
                        <span class="title-hint">Enter para começar</span>
                    </div>
                    <textarea class="content-editor" id="contentInput" placeholder="Comece a escrever...

💡 Dicas:
• Suas notas são salvas automaticamente no navegador (localStorage)
• Você pode fechar o navegador que as notas permanecem aqui
• Use os botões acima para copiar, colar e selecionar"></textarea>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-left">
                    <span class="status-item">
                        <span>📝</span>
                        <span id="wordCount">0 palavras</span>
                    </span>
                    <span class="status-item">
                        <span>📄</span>
                        <span id="charCount">0 caracteres</span>
                    </span>
                    <span class="status-item">
                        <span>📊</span>
                        <span id="lineCount">0 linhas</span>
                    </span>
                </div>
                <div class="status-item" id="lastSaved">
                    <span>💾</span>
                    <span>Salvo localmente</span>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ╔════════════════════════════════════════════════════════════╗
        // ║  SISTEMA DE ARMAZENAMENTO LOCAL (localStorage)             ║
        // ║  • Todas as notas são salvas no navegador                  ║
        // ║  • Persiste mesmo após fechar o navegador                  ║
        // ║  • Não precisa de internet                                 ║
        // ╚════════════════════════════════════════════════════════════╝

        const STORAGE_KEY = 'notes-app-data-v1'; // Chave do localStorage

        let notes = [];
        let currentNoteId = null;
        let saveTimeout = null;
        let isSaving = false;

        // Elementos
        const sidebar = document.getElementById('sidebar');
        const notesList = document.getElementById('notesList');
        const titleInput = document.getElementById('titleInput');
        const contentInput = document.getElementById('contentInput');
        const emptyState = document.getElementById('emptyState');
        const editorWrapper = document.getElementById('editorWrapper');
        const breadcrumbTitle = document.getElementById('breadcrumbTitle');
        const autoSaveIndicator = document.getElementById('autoSaveIndicator');
        const storageInfo = document.getElementById('storageInfo');
        const searchInput = document.getElementById('searchInput');

        // ╔════════════════════════════════════════════════════════════╗
        // ║  INICIALIZAÇÃO - Carrega do localStorage                   ║
        // ╚════════════════════════════════════════════════════════════╝
        window.addEventListener('DOMContentLoaded', () => {
            loadFromStorage(); // ← CARREGA DO LOCALSTORAGE
            renderNotesList();
            if (notes.length > 0) {
                loadNote(notes[0].id);
            }
            updateStats();
            setupEventListeners();

            // Verifica se localStorage está disponível
            if (!isStorageAvailable()) {
                showToast('⚠️ Armazenamento local não disponível', 'error');
            }
        });

        function isStorageAvailable() {
            try {
                const test = '__storage_test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch (e) {
                return false;
            }
        }

        // ╔════════════════════════════════════════════════════════════╗
        // ║  FUNÇÕES DE ARMAZENAMENTO                                  ║
        // ╚════════════════════════════════════════════════════════════╝

        // CARREGA do localStorage
        function loadFromStorage() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    notes = JSON.parse(stored);
                    console.log(`📂 Carregado ${notes.length} notas do localStorage`);
                } else {
                    notes = [];
                    console.log('📂 Nenhuma nota encontrada, iniciando vazio');
                }
            } catch (e) {
                console.error('Erro ao carregar:', e);
                notes = [];
            }
        }

        // SALVA no localStorage
        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                updateNotesCount();

                // Feedback visual
                storageInfo.classList.add('saved');
                setTimeout(() => storageInfo.classList.remove('saved'), 1000);

                console.log(`💾 Salvo ${notes.length} notas no localStorage`);
            } catch (e) {
                console.error('Erro ao salvar:', e);
                showToast('❌ Erro ao salvar', 'error');
            }
        }

        // ╔════════════════════════════════════════════════════════════╗
        // ║  RESTO DO CÓDIGO (funções de edição, etc)                 ║
        // ╚════════════════════════════════════════════════════════════╝

        function setupEventListeners() {
            titleInput.addEventListener('input', () => {
                autoResize(titleInput);
                queueSave();
                updateBreadcrumb();
            });

            titleInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    contentInput.focus();
                }
            });

            contentInput.addEventListener('input', () => {
                queueSave();
                updateStats();
            });

            searchInput.addEventListener('input', renderNotesList);

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'n') {
                        e.preventDefault();
                        createNewNote();
                    } else if (e.key === 'd') {
                        e.preventDefault();
                        downloadNote();
                    }
                }
            });
        }

        function autoResize(element) {
            element.style.height = 'auto';
            element.style.height = element.scrollHeight + 'px';
        }

        function queueSave() {
            if (saveTimeout) clearTimeout(saveTimeout);

            isSaving = true;
            updateSaveIndicator();

            saveTimeout = setTimeout(() => {
                saveCurrentNote();
            }, 800);
        }

        function saveCurrentNote() {
            if (!currentNoteId) return;

            const note = notes.find(n => n.id === currentNoteId);
            if (note) {
                note.title = titleInput.value.trim();
                note.content = contentInput.value;
                note.updatedAt = new Date().toISOString();

                // Auto-título da primeira linha se vazio
                if (!note.title && note.content) {
                    const firstLine = note.content.split('\n')[0].trim();
                    if (firstLine) {
                        note.title = firstLine.substring(0, 50);
                        titleInput.value = note.title;
                        autoResize(titleInput);
                    }
                }

                // Move para topo
                notes = notes.filter(n => n.id !== currentNoteId);
                notes.unshift(note);

                saveToStorage(); // ← SALVA NO LOCALSTORAGE
                renderNotesList();
                updateBreadcrumb();
            }

            isSaving = false;
            updateSaveIndicator();
        }

        function updateSaveIndicator() {
            if (isSaving) {
                autoSaveIndicator.innerHTML = '<span>Salvando...</span>';
                autoSaveIndicator.classList.add('saving');
                document.getElementById('lastSaved').innerHTML = '<span>💾</span><span>Salvando...</span>';
            } else {
                autoSaveIndicator.innerHTML = '<span>💾 localStorage</span>';
                autoSaveIndicator.classList.remove('saving');
                document.getElementById('lastSaved').innerHTML = '<span>✓</span><span>Salvo localmente</span>';
            }
        }

        // ... (restante das funções: createNewNote, loadNote, etc - mantidas iguais)

        function createNewNote() {
            const id = Date.now().toString();
            const newNote = {
                id: id,
                title: '',
                content: '',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            notes.unshift(newNote);
            saveToStorage();
            renderNotesList();
            loadNote(id);
            titleInput.focus();
            showToast('✨ Nova nota criada e salva');
        }

        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            currentNoteId = id;
            titleInput.value = note.title;
            contentInput.value = note.content;

            autoResize(titleInput);
            emptyState.style.display = 'none';
            editorWrapper.style.display = 'block';
            updateBreadcrumb();
            updateStats();
            renderNotesList();

            setTimeout(() => {
                if (note.title) contentInput.focus();
                else titleInput.focus();
            }, 50);
        }

        function updateBreadcrumb() {
            const title = titleInput.value.trim();
            breadcrumbTitle.textContent = title || 'Sem título';
        }

        function updateStats() {
            const text = contentInput.value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const chars = text.length;
            const lines = text === '' ? 0 : text.split('\n').length;

            document.getElementById('wordCount').textContent = `${words} palavras`;
            document.getElementById('charCount').textContent = `${chars} caracteres`;
            document.getElementById('lineCount').textContent = `${lines} linhas`;
        }

        function renderNotesList() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredNotes = searchTerm 
                ? notes.filter(n => 
                    (n.title || '').toLowerCase().includes(searchTerm) ||
                    n.content.toLowerCase().includes(searchTerm)
                  )
                : notes;

            if (filteredNotes.length === 0) {
                notesList.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: var(--text-tertiary);">
                        <div style="font-size: 32px; margin-bottom: 12px;">🔍</div>
                        <div style="font-size: 14px;">Nenhuma nota encontrada</div>
                    </div>
                `;
                return;
            }

            notesList.innerHTML = filteredNotes.map(note => {
                const isActive = note.id === currentNoteId;
                const date = new Date(note.updatedAt);
                const dateStr = formatDate(date);
                const displayTitle = note.title || 'Sem título';
                const preview = getPreview(note.content);

                return `
                    <div class="note-item ${isActive ? 'active' : ''}" onclick="loadNote('${note.id}')">
                        <div class="note-item-title">
                            ${escapeHtml(displayTitle)}
                            ${isActive && isSaving ? '<span class="note-item-dot"></span>' : ''}
                        </div>
                        <div class="note-item-preview">${escapeHtml(preview)}</div>
                        <div class="note-item-meta">
                            <span>${dateStr}</span>
                            <span>•</span>
                            <span>${countWords(note.content)} palavras</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getPreview(content) {
            if (!content) return 'Sem conteúdo';
            const lines = content.split('\n').filter(line => line.trim());
            if (lines.length === 0) return 'Sem conteúdo';

            const firstLine = lines[0].trim();
            if (firstLine.length > 60) return firstLine.substring(0, 60) + '...';

            if (lines.length > 1) {
                const secondLine = lines[1].trim();
                if (secondLine) return secondLine.length > 60 ? secondLine.substring(0, 60) + '...' : secondLine;
            }

            return firstLine.length > 60 ? firstLine.substring(0, 60) + '...' : firstLine;
        }

        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            else if (days === 1) return 'Ontem';
            else if (days < 7) return date.toLocaleDateString('pt-BR', { weekday: 'short' });
            else return date.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
        }

        function countWords(text) {
            return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Botões de edição
        function selectAllContent() {
            if (!currentNoteId) { showToast('Selecione uma nota primeiro', 'error'); return; }
            contentInput.focus();
            contentInput.select();
            showToast('☐ Conteúdo selecionado');
        }

        async function copyContent() {
            if (!currentNoteId) { showToast('Selecione uma nota primeiro', 'error'); return; }
            const text = contentInput.value;
            if (!text) { showToast('Nada para copiar', 'error'); return; }

            try {
                await navigator.clipboard.writeText(text);
                showToast('📋 Copiado!');
            } catch (err) {
                contentInput.select();
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                showToast('📋 Copiado!');
            }
        }

        async function pasteContent() {
            if (!currentNoteId) { showToast('Selecione uma nota primeiro', 'error'); return; }

            try {
                const text = await navigator.clipboard.readText();
                const start = contentInput.selectionStart;
                const end = contentInput.selectionEnd;
                const before = contentInput.value.substring(0, start);
                const after = contentInput.value.substring(end);

                contentInput.value = before + text + after;
                contentInput.selectionStart = contentInput.selectionEnd = start + text.length;

                queueSave();
                updateStats();
                showToast('📌 Colado!');
            } catch (err) {
                showToast('Use Ctrl+V para colar', 'error');
            }
        }

        function downloadNote() {
            if (!currentNoteId) { showToast('Selecione uma nota primeiro', 'error'); return; }
            const note = notes.find(n => n.id === currentNoteId);
            const content = `${note.title || 'Sem título'}\n\n${note.content}`;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${note.title || 'nota'}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('⬇️ Exportado!');
        }

        function duplicateNote() {
            if (!currentNoteId) { showToast('Selecione uma nota primeiro', 'error'); return; }
            const note = notes.find(n => n.id === currentNoteId);
            const newNote = {
                id: Date.now().toString(),
                title: note.title ? `${note.title} (Cópia)` : 'Sem título (Cópia)',
                content: note.content,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            notes.unshift(newNote);
            saveToStorage();
            renderNotesList();
            loadNote(newNote.id);
            showToast('📋 Duplicado!');
        }

        function deleteNote() {
            if (!currentNoteId) { showToast('Selecione uma nota primeiro', 'error'); return; }
            if (!confirm('Tem certeza que deseja excluir esta nota?')) return;

            notes = notes.filter(n => n.id !== currentNoteId);
            saveToStorage();

            if (notes.length > 0) {
                loadNote(notes[0].id);
            } else {
                currentNoteId = null;
                emptyState.style.display = 'block';
                editorWrapper.style.display = 'none';
                breadcrumbTitle.textContent = 'Selecione uma nota';
            }

            renderNotesList();
            showToast('🗑️ Excluído!');
        }

        function updateNotesCount() {
            document.getElementById('notesCount').textContent = `${notes.length} nota${notes.length !== 1 ? 's' : ''}`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 200);
            }, 2500);
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
        }

        // Expor funções
        window.createNewNote = createNewNote;
        window.loadNote = loadNote;
        window.downloadNote = downloadNote;
        window.duplicateNote = duplicateNote;
        window.deleteNote = deleteNote;
        window.toggleSidebar = toggleSidebar;
        window.selectAllContent = selectAllContent;
        window.copyContent = copyContent;
        window.pasteContent = pasteContent;
    </script>
</body>
</html>
