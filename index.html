<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Pro - Gerenciador de Notas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-editor: #ffffff;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar - Lista de Arquivos */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .new-file-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .new-file-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .file-item {
            padding: 0.875rem 1rem;
            margin: 0.25rem 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .file-item.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .file-item.active .file-name,
        .file-item.active .file-date {
            color: white;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .file-name {
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .file-actions {
            display: flex;
            gap: 0.25rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .file-item:hover .file-actions {
            opacity: 1;
        }

        .file-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: currentColor;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .file-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-editor);
        }

        /* Top Bar */
        .top-bar {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            font-size: 0.875rem;
        }

        .current-file {
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .unsaved-indicator {
            width: 8px;
            height: 8px;
            background: var(--warning);
            border-radius: 50%;
            display: none;
        }

        .unsaved-indicator.show {
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
        }

        .quick-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.15s;
            color: #475569;
        }

        .quick-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .quick-btn.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quick-btn.primary:hover {
            background: var(--primary-dark);
        }

        .shortcut-hint {
            font-size: 0.75rem;
            opacity: 0.6;
            background: rgba(0,0,0,0.1);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.25rem;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .editor {
            width: 100%;
            height: 100%;
            padding: 2rem;
            border: none;
            outline: none;
            font-size: 1rem;
            line-height: 1.8;
            color: #1e293b;
            resize: none;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            tab-size: 2;
        }

        .editor::placeholder {
            color: #94a3b8;
        }

        /* Status Bar */
        .status-bar {
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #64748b;
        }

        .status-left {
            display: flex;
            gap: 1.5rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-right {
            display: flex;
            gap: 1rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 1000;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 0.875rem 1.25rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
            min-width: 250px;
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--primary); }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.hide {
            animation: slideOut 0.3s ease forwards;
        }

        @keyframes slideOut {
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1e293b;
        }

        .modal-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-btn.secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        .modal-btn.primary {
            background: var(--primary);
            color: white;
        }

        /* Empty State */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #94a3b8;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .empty-subtext {
            font-size: 0.875rem;
        }

        /* Mobile Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .quick-actions {
                display: none;
            }
        }

        /* Search highlight */
        .search-highlight {
            background: #fef08a;
            color: #854d0e;
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span>📝</span>
                <span>Notepad Pro</span>
            </div>
            <button class="new-file-btn" onclick="createNewFile()">
                <span>+</span>
                <span>Nova Nota</span>
            </button>
        </div>
        <div class="file-list" id="fileList">
            <!-- Files will be listed here -->
        </div>
        <div class="sidebar-footer">
            <span id="totalFiles">0 notas</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-bar">
            <div class="breadcrumbs">
                <span>📁 Minhas Notas</span>
                <span>/</span>
                <span class="current-file" id="currentFileName">
                    <span id="fileIcon">📄</span>
                    <span id="fileNameDisplay">Selecione uma nota</span>
                    <span class="unsaved-indicator" id="unsavedIndicator"></span>
                </span>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="saveCurrentFile()" title="Salvar arquivo">
                    💾 Salvar
                    <span class="shortcut-hint">Ctrl+S</span>
                </button>
                <button class="quick-btn" onclick="downloadCurrentFile()" title="Baixar como .txt">
                    ⬇️ Exportar
                    <span class="shortcut-hint">Ctrl+D</span>
                </button>
                <button class="quick-btn" onclick="renameCurrentFile()" title="Renomear">
                    ✏️ Renomear
                    <span class="shortcut-hint">F2</span>
                </button>
                <button class="quick-btn" onclick="duplicateCurrentFile()" title="Duplicar">
                    📋 Duplicar
                    <span class="shortcut-hint">Ctrl+Shift+D</span>
                </button>
                <button class="quick-btn danger" onclick="deleteCurrentFile()" title="Excluir">
                    🗑️ Excluir
                    <span class="shortcut-hint">Del</span>
                </button>
            </div>
        </div>

        <div class="editor-container">
            <textarea 
                class="editor" 
                id="editor"
                placeholder="Selecione uma nota na barra lateral ou crie uma nova..."
                disabled
            ></textarea>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📝</div>
                <div class="empty-text">Nenhuma nota selecionada</div>
                <div class="empty-subtext">Crie uma nova nota ou selecione uma existente</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-left">
                <span class="status-item">
                    <span>📝</span>
                    <span id="wordCount">0 palavras</span>
                </span>
                <span class="status-item">
                    <span>📊</span>
                    <span id="charCount">0 caracteres</span>
                </span>
                <span class="status-item">
                    <span>📄</span>
                    <span id="lineCount">0 linhas</span>
                </span>
            </div>
            <div class="status-right">
                <span class="status-item" id="lastSaved">Não salvo</span>
                <span class="status-item">UTF-8</span>
            </div>
        </div>
    </main>

    <!-- Mobile Toggle -->
    <button class="mobile-toggle" onclick="toggleSidebar()" id="mobileToggle">📂</button>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Título</div>
            <input type="text" class="modal-input" id="modalInput" placeholder="Digite aqui...">
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeModal()">Cancelar</button>
                <button class="modal-btn primary" onclick="confirmModal()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let files = JSON.parse(localStorage.getItem('notepad-files')) || [];
        let currentFileId = null;
        let hasUnsavedChanges = false;
        let modalCallback = null;

        // DOM Elements
        const editor = document.getElementById('editor');
        const fileList = document.getElementById('fileList');
        const currentFileName = document.getElementById('fileNameDisplay');
        const fileIcon = document.getElementById('fileIcon');
        const unsavedIndicator = document.getElementById('unsavedIndicator');
        const emptyState = document.getElementById('emptyState');
        const totalFiles = document.getElementById('totalFiles');
        const sidebar = document.getElementById('sidebar');

        // Initialize
        window.addEventListener('load', () => {
            renderFileList();
            if (files.length > 0) {
                loadFile(files[0].id);
            }
            updateStats();
        });

        // File Management
        function createNewFile() {
            const id = Date.now().toString();
            const newFile = {
                id: id,
                name: `Nota ${files.length + 1}`,
                content: '',
                created: new Date().toISOString(),
                modified: new Date().toISOString()
            };
            files.unshift(newFile);
            saveFiles();
            renderFileList();
            loadFile(id);
            showToast('✅ Nova nota criada', 'success');

            // Focus editor
            setTimeout(() => editor.focus(), 100);
        }

        function loadFile(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;

            // Save current if unsaved
            if (currentFileId && hasUnsavedChanges) {
                saveCurrentFile(false);
            }

            currentFileId = id;
            editor.value = file.content;
            editor.disabled = false;
            hasUnsavedChanges = false;

            updateUI();
            renderFileList();
            updateStats();

            // Hide empty state
            emptyState.style.display = 'none';

            // Focus editor
            editor.focus();
        }

        function saveCurrentFile(showNotification = true) {
            if (!currentFileId) return;

            const file = files.find(f => f.id === currentFileId);
            if (file) {
                file.content = editor.value;
                file.modified = new Date().toISOString();
                saveFiles();
                hasUnsavedChanges = false;
                updateUI();

                if (showNotification) {
                    showToast('💾 Salvo com sucesso', 'success');
                }
            }
        }

        function downloadCurrentFile() {
            if (!currentFileId) {
                showToast('❌ Nenhuma nota selecionada', 'error');
                return;
            }

            const file = files.find(f => f.id === currentFileId);
            const blob = new Blob([file.content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${file.name}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('⬇️ Arquivo baixado', 'success');
        }

        function renameCurrentFile() {
            if (!currentFileId) {
                showToast('❌ Nenhuma nota selecionada', 'error');
                return;
            }

            const file = files.find(f => f.id === currentFileId);
            showModal('Renomear Nota', file.name, (newName) => {
                if (newName && newName.trim()) {
                    file.name = newName.trim();
                    file.modified = new Date().toISOString();
                    saveFiles();
                    renderFileList();
                    updateUI();
                    showToast('✏️ Renomeado com sucesso', 'success');
                }
            });
        }

        function duplicateCurrentFile() {
            if (!currentFileId) {
                showToast('❌ Nenhuma nota selecionada', 'error');
                return;
            }

            const file = files.find(f => f.id === currentFileId);
            const newFile = {
                id: Date.now().toString(),
                name: `${file.name} (Cópia)`,
                content: file.content,
                created: new Date().toISOString(),
                modified: new Date().toISOString()
            };
            files.unshift(newFile);
            saveFiles();
            renderFileList();
            loadFile(newFile.id);
            showToast('📋 Nota duplicada', 'success');
        }

        function deleteCurrentFile() {
            if (!currentFileId) {
                showToast('❌ Nenhuma nota selecionada', 'error');
                return;
            }

            if (confirm('Tem certeza que deseja excluir esta nota?')) {
                files = files.filter(f => f.id !== currentFileId);
                saveFiles();

                if (files.length > 0) {
                    loadFile(files[0].id);
                } else {
                    currentFileId = null;
                    editor.value = '';
                    editor.disabled = true;
                    emptyState.style.display = 'block';
                    updateUI();
                }

                renderFileList();
                showToast('🗑️ Nota excluída', 'success');
            }
        }

        function deleteFile(id, event) {
            event.stopPropagation();
            if (confirm('Excluir esta nota?')) {
                files = files.filter(f => f.id !== id);
                saveFiles();

                if (currentFileId === id) {
                    if (files.length > 0) {
                        loadFile(files[0].id);
                    } else {
                        currentFileId = null;
                        editor.value = '';
                        editor.disabled = true;
                        emptyState.style.display = 'block';
                    }
                }

                renderFileList();
                showToast('🗑️ Nota excluída', 'success');
            }
        }

        // UI Updates
        function renderFileList() {
            fileList.innerHTML = '';

            files.forEach(file => {
                const item = document.createElement('div');
                item.className = `file-item ${file.id === currentFileId ? 'active' : ''}`;
                item.onclick = () => loadFile(file.id);

                const date = new Date(file.modified);
                const dateStr = date.toLocaleDateString('pt-BR', { 
                    day: '2-digit', 
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                item.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${escapeHtml(file.name)}</span>
                        <span class="file-date">${dateStr}</span>
                    </div>
                    <div class="file-actions">
                        <button class="file-btn" onclick="deleteFile('${file.id}', event)" title="Excluir">🗑️</button>
                    </div>
                `;

                fileList.appendChild(item);
            });

            totalFiles.textContent = `${files.length} nota${files.length !== 1 ? 's' : ''}`;
        }

        function updateUI() {
            if (currentFileId) {
                const file = files.find(f => f.id === currentFileId);
                currentFileName.textContent = file.name;
                fileIcon.textContent = hasUnsavedChanges ? '💾' : '📄';
                unsavedIndicator.classList.toggle('show', hasUnsavedChanges);
                document.getElementById('lastSaved').textContent = hasUnsavedChanges ? 'Modificado' : 'Salvo';
            } else {
                currentFileName.textContent = 'Selecione uma nota';
                fileIcon.textContent = '📄';
                unsavedIndicator.classList.remove('show');
            }
        }

        function updateStats() {
            const text = editor.value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const chars = text.length;
            const lines = text === '' ? 0 : text.split('\n').length;

            document.getElementById('wordCount').textContent = `${words.toLocaleString()} palavras`;
            document.getElementById('charCount').textContent = `${chars.toLocaleString()} caracteres`;
            document.getElementById('lineCount').textContent = `${lines} linha${lines !== 1 ? 's' : ''}`;
        }

        // Editor Events
        editor.addEventListener('input', () => {
            hasUnsavedChanges = true;
            updateUI();
            updateStats();

            // Auto-save after delay
            clearTimeout(window.saveTimeout);
            window.saveTimeout = setTimeout(() => {
                saveCurrentFile(false);
            }, 2000);
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + S - Save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveCurrentFile();
            }

            // Ctrl/Cmd + D - Download
            if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                e.preventDefault();
                downloadCurrentFile();
            }

            // Ctrl/Cmd + N - New File
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                createNewFile();
            }

            // F2 - Rename
            if (e.key === 'F2') {
                e.preventDefault();
                renameCurrentFile();
            }

            // Ctrl/Cmd + Shift + D - Duplicate
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                duplicateCurrentFile();
            }

            // Delete - Delete current file
            if (e.key === 'Delete' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                deleteCurrentFile();
            }
        });

        // Modal Functions
        function showModal(title, defaultValue, callback) {
            document.getElementById('modalTitle').textContent = title;
            const input = document.getElementById('modalInput');
            input.value = defaultValue || '';
            modalCallback = callback;
            document.getElementById('modal').classList.add('show');
            input.focus();
            input.select();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            modalCallback = null;
        }

        function confirmModal() {
            const value = document.getElementById('modalInput').value;
            if (modalCallback) {
                modalCallback(value);
            }
            closeModal();
        }

        document.getElementById('modalInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmModal();
            }
        });

        // Utility Functions
        function saveFiles() {
            localStorage.setItem('notepad-files', JSON.stringify(files));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                sidebar.classList.contains('open') &&
                !sidebar.contains(e.target) &&
                !e.target.matches('#mobileToggle')) {
                sidebar.classList.remove('open');
            }
        });
    </script>
</body>
</html>
