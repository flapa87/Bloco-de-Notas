<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notas Pro - Seu Bloco de Notas Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Merriweather:wght@300;400;700&family=Ubuntu:wght@300;400;500;700&family=Fira+Code:wght@300;400;500&family=Nunito:wght@300;400;600;700&family=Oswald:wght@300;400;500;700&family=Raleway:wght@300;400;500;600;700&family=PT+Sans:wght@400;700&family=Noto+Sans:wght@300;400;500;700&family=Work+Sans:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                transition: left 0.3s ease;
                box-shadow: none;
            }
            
            .sidebar.show {
                left: 0;
                box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            }
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-note-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .search-box {
            margin-top: 12px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .note-item {
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-item:active {
            transform: scale(0.98);
        }

        .note-item.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }

        .note-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            position: relative;
            min-width: 0;
        }

        .toolbar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.5);
            gap: 10px;
        }

        .toolbar-left, .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tool-btn {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .word-count {
            font-size: 12px;
            color: var(--text-secondary);
            display: none;
        }

        @media (min-width: 600px) {
            .word-count {
                display: block;
            }
        }

        .editor-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .editor-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            min-height: 400px;
            border: 1px solid var(--border);
            transition: background-color 0.3s;
        }

        .note-title-input {
            width: 100%;
            font-size: 24px;
            font-weight: 700;
            background: transparent;
            border: none;
            color: inherit;
            outline: none;
            margin-bottom: 16px;
            transition: color 0.3s;
        }

        .format-toolbar {
            display: flex;
            gap: 6px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 16px;
            overflow-x: auto;
            flex-wrap: nowrap;
            align-items: center;
        }

        .format-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .format-btn {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            min-width: 36px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s;
            position: relative;
        }

        .format-btn:active {
            transform: scale(0.95);
        }

        .format-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .format-btn.font-size {
            font-size: 12px;
            padding: 8px;
        }

        .format-select {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            flex-shrink: 0;
            min-width: 100px;
        }

        .color-picker-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }

        .color-btn:active {
            transform: scale(0.9);
        }

        .color-btn.text-color {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1);
        }

        .color-btn.bg-color {
            background: linear-gradient(135deg, #1e293b, #334155, #0f172a);
        }

        input[type="color"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .separator {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 4px;
            flex-shrink: 0;
        }

        .editor {
            width: 100%;
            min-height: 300px;
            background: transparent;
            border: none;
            color: inherit;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
            padding: 10px 0;
            transition: font-family 0.3s, font-size 0.3s, color 0.3s;
        }

        .editor:empty:before {
            content: 'Comece a escrever...';
            color: inherit;
            opacity: 0.5;
            pointer-events: none;
        }

        .status-bar {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(30, 41, 59, 0.5);
        }

        .status-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 6px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        @media (max-width: 768px) {
            .overlay.show {
                display: block;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .modal-text {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .export-wrapper {
            position: relative;
        }

        .export-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            min-width: 180px;
            box-shadow: var(--shadow);
            z-index: 50;
        }

        .export-menu.show {
            display: block;
        }

        .export-item {
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
        }

        .export-item:active {
            background: rgba(99, 102, 241, 0.2);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::selection {
            background: rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="overlay" id="overlay" onclick="closeMenu()"></div>

        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">📝</div>
                    <div class="logo-text">Notas Pro</div>
                </div>
                <button class="new-note-btn" onclick="newNote()">
                    <span>+</span>
                    <span>Nova Nota</span>
                </button>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search" placeholder="Pesquisar..." oninput="searchNotes()">
                </div>
            </div>
            <div class="notes-list" id="notesList"></div>
        </nav>

        <main class="main">
            <header class="toolbar">
                <div class="toolbar-left">
                    <button class="tool-btn" onclick="toggleMenu()" id="menuBtn">☰</button>
                    <button class="tool-btn" onclick="deleteNote()" id="deleteBtn" style="display:none">🗑️</button>
                    <div class="export-wrapper">
                        <button class="tool-btn" onclick="toggleExport()">📥</button>
                        <div class="export-menu" id="exportMenu">
                            <div class="export-item" onclick="exportAs('txt')">📄 Texto (.txt)</div>
                            <div class="export-item" onclick="exportAs('md')">📝 Markdown (.md)</div>
                            <div class="export-item" onclick="exportAs('html')">🌐 HTML (.html)</div>
                        </div>
                    </div>
                </div>
                <div class="toolbar-right">
                    <span class="word-count" id="wordCount">0 palavras</span>
                </div>
            </header>

            <div class="editor-container" id="editorContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📝</div>
                    <h3>Bem-vindo ao Notas Pro</h3>
                    <p style="margin-top:8px;opacity:0.7">Crie uma nova nota para começar</p>
                </div>

                <div class="editor-wrapper" id="editorWrapper" style="display:none">
                    <input type="text" class="note-title-input" id="titleInput" placeholder="Título da nota" oninput="saveCurrent()">
                    
                    <!-- Toolbar Completa -->
                    <div class="format-toolbar">
                        <!-- Estilo de Fonte - 18 opções -->
                        <select class="format-select" id="fontSelect" onchange="applyFont(this.value)" title="Fonte">
                            <option value="Inter">Inter</option>
                            <option value="Roboto">Roboto</option>
                            <option value="Open Sans">Open Sans</option>
                            <option value="Lato">Lato</option>
                            <option value="Montserrat">Montserrat</option>
                            <option value="Poppins">Poppins</option>
                            <option value="Playfair Display">Playfair</option>
                            <option value="Merriweather">Merriweather</option>
                            <option value="Ubuntu">Ubuntu</option>
                            <option value="Fira Code">Fira Code</option>
                            <option value="Nunito">Nunito</option>
                            <option value="Oswald">Oswald</option>
                            <option value="Raleway">Raleway</option>
                            <option value="PT Sans">PT Sans</option>
                            <option value="Noto Sans">Noto Sans</option>
                            <option value="Work Sans">Work Sans</option>
                            <option value="Quicksand">Quicksand</option>
                            <option value="Rubik">Rubik</option>
                        </select>
                        
                        <div class="separator"></div>
                        
                        <!-- Tamanho da Fonte -->
                        <div class="format-group">
                            <button class="format-btn font-size" onclick="changeFontSize(-2)" title="Diminuir">A-</button>
                            <button class="format-btn font-size" onclick="changeFontSize(2)" title="Aumentar">A+</button>
                        </div>
                        
                        <div class="separator"></div>
                        
                        <!-- Cor do Texto -->
                        <div class="color-picker-wrapper">
                            <div class="color-btn text-color" title="Cor do texto">
                                A
                                <input type="color" id="textColor" oninput="applyTextColor(this.value)" value="#f1f5f9">
                            </div>
                        </div>
                        
                        <!-- Cor de Fundo do Editor -->
                        <div class="color-picker-wrapper">
                            <div class="color-btn bg-color" title="Cor de fundo da página">
                                ░
                                <input type="color" id="bgColor" oninput="applyBgColor(this.value)" value="#1e293b">
                            </div>
                        </div>
                        
                        <div class="separator"></div>
                        
                        <!-- Formatação Básica -->
                        <button class="format-btn" id="btn-bold" onclick="execFormat('bold', 'btn-bold')" title="Negrito"><b>B</b></button>
                        <button class="format-btn" id="btn-italic" onclick="execFormat('italic', 'btn-italic')" title="Itálico"><i>I</i></button>
                        <button class="format-btn" id="btn-underline" onclick="execFormat('underline', 'btn-underline')" title="Sublinhado"><u>U</u></button>
                        <button class="format-btn" id="btn-strike" onclick="execFormat('strikeThrough', 'btn-strike')" title="Tachado"><s>S</s></button>
                        
                        <div class="separator"></div>
                        
                        <!-- Alinhamento -->
                        <button class="format-btn" id="btn-left" onclick="execFormat('justifyLeft', 'btn-left')" title="Esquerda">⬅️</button>
                        <button class="format-btn" id="btn-center" onclick="execFormat('justifyCenter', 'btn-center')" title="Centro">⬆️</button>
                        <button class="format-btn" id="btn-right" onclick="execFormat('justifyRight', 'btn-right')" title="Direita">➡️</button>
                        
                        <div class="separator"></div>
                        
                        <!-- Listas -->
                        <button class="format-btn" id="btn-ul" onclick="execFormat('insertUnorderedList', 'btn-ul')" title="Lista">•</button>
                        <button class="format-btn" id="btn-ol" onclick="execFormat('insertOrderedList', 'btn-ol')" title="Numerada">1.</button>
                        
                        <div class="separator"></div>
                        
                        <!-- Limpar -->
                        <button class="format-btn" onclick="clearFormat()" title="Limpar">🧹</button>
                    </div>

                    <div class="editor" id="editor" contenteditable="true" oninput="saveCurrent()" onmouseup="updateActiveButtons()" onkeyup="updateActiveButtons()" ontouchend="updateActiveButtons()"></div>
                </div>
            </div>

            <footer class="status-bar">
                <div class="status-left">
                    <span><span class="status-indicator"></span><span id="saveStatus">Pronto</span></span>
                    <span id="lastMod">--</span>
                </div>
                <div>Sem limites</div>
            </footer>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">🗑️ Excluir nota?</div>
            <div class="modal-text">Esta ação não pode ser desfeita.</div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Excluir</button>
            </div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let currentId = null;
        let menuOpen = false;
        let currentFontSize = 16;
        let currentFont = 'Inter';
        let currentColor = '#f1f5f9';

        // Configurações atuais para digitação futura
        let pendingStyles = {
            fontFamily: 'Inter',
            fontSize: '16px',
            color: '#f1f5f9'
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderList();
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.export-wrapper')) {
                    document.getElementById('exportMenu').classList.remove('show');
                }
            });

            setInterval(() => {
                if (currentId) localStorage.setItem('notes', JSON.stringify(notes));
            }, 2000);

            // Aplicar estilos pendentes ao digitar
            const editor = document.getElementById('editor');
            editor.addEventListener('keydown', (e) => {
                // Se for um caractere visível e não houver seleção
                if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    const selection = window.getSelection();
                    if (selection.isCollapsed) {
                        applyPendingStyles();
                    }
                }
            });
        });

        // APLICAR FONTE - funciona com ou sem seleção
        function applyFont(fontName) {
            currentFont = fontName;
            pendingStyles.fontFamily = fontName;
            
            const editor = document.getElementById('editor');
            const selection = window.getSelection();
            
            if (selection.toString().length > 0) {
                // Com seleção - aplica no texto selecionado
                wrapSelection('fontFamily', fontName);
            } else {
                // Sem seleção - aplica no editor para digitação futura
                editor.style.fontFamily = fontName;
                editor.focus();
            }
            
            saveCurrent();
        }

        // APLICAR COR DO TEXTO - funciona com ou sem seleção
        function applyTextColor(color) {
            currentColor = color;
            pendingStyles.color = color;
            
            const editor = document.getElementById('editor');
            const selection = window.getSelection();
            
            if (selection.toString().length > 0) {
                // Com seleção
                wrapSelection('color', color);
            } else {
                // Sem seleção - aplica no editor
                editor.style.color = color;
                editor.focus();
            }
            
            saveCurrent();
        }

        // APLICAR COR DE FUNDO DO EDITOR (background da área toda)
        function applyBgColor(color) {
            const wrapper = document.getElementById('editorWrapper');
            wrapper.style.backgroundColor = color;
            
            // Ajustar cor do texto automaticamente baseado no fundo
            const rgb = hexToRgb(color);
            const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
            const textColor = brightness > 128 ? '#0f172a' : '#f1f5f9';
            
            wrapper.style.color = textColor;
            document.getElementById('editor').style.color = textColor;
            document.getElementById('titleInput').style.color = textColor;
            
            saveCurrent();
        }

        // Converter hex para RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // Aplicar estilos pendentes ao digitar
        function applyPendingStyles() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            if (!range.collapsed) return;
            
            // Criar span com estilos pendentes
            const span = document.createElement('span');
            span.style.fontFamily = pendingStyles.fontFamily;
            span.style.fontSize = pendingStyles.fontSize;
            span.style.color = pendingStyles.color;
            span.textContent = '\u200B'; // Zero-width space temporário
            
            range.insertNode(span);
            
            // Mover cursor para dentro do span
            range.selectNodeContents(span);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        // MUDAR TAMANHO DA FONTE
        function changeFontSize(delta) {
            currentFontSize += delta;
            if (currentFontSize < 10) currentFontSize = 10;
            if (currentFontSize > 72) currentFontSize = 72;
            
            pendingStyles.fontSize = currentFontSize + 'px';
            
            const editor = document.getElementById('editor');
            const selection = window.getSelection();
            
            if (selection.toString().length > 0) {
                // Com seleção
                const selectedText = selection.toString();
                const span = document.createElement('span');
                span.style.fontSize = currentFontSize + 'px';
                span.textContent = selectedText;
                
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(span);
                
                // Restaurar seleção
                selection.removeAllRanges();
                const newRange = document.createRange();
                newRange.selectNodeContents(span);
                selection.addRange(newRange);
            } else {
                // Sem seleção - aplica no editor
                editor.style.fontSize = currentFontSize + 'px';
                editor.focus();
            }
            
            saveCurrent();
        }

        // WRAP SELECTION - aplica estilo no texto selecionado
        function wrapSelection(style, value) {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            const selectedText = range.toString();
            
            if (!selectedText) return;
            
            const span = document.createElement('span');
            if (style === 'fontFamily') {
                span.style.fontFamily = value;
            } else if (style === 'color') {
                span.style.color = value;
            }
            
            span.textContent = selectedText;
            range.deleteContents();
            range.insertNode(span);
            
            // Restaurar seleção
            selection.removeAllRanges();
            const newRange = document.createRange();
            newRange.selectNodeContents(span);
            selection.addRange(newRange);
        }

        // Executar formatação básica (bold, italic, etc)
        function execFormat(command, btnId) {
            const editor = document.getElementById('editor');
            editor.focus();
            
            document.execCommand(command, false, null);
            
            const btn = document.getElementById(btnId);
            setTimeout(() => {
                try {
                    if (document.queryCommandState(command)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                } catch(e) {
                    btn.classList.remove('active');
                }
            }, 10);
            
            saveCurrent();
        }

        // Atualizar botões ativos
        function updateActiveButtons() {
            const buttons = [
                { cmd: 'bold', id: 'btn-bold' },
                { cmd: 'italic', id: 'btn-italic' },
                { cmd: 'underline', id: 'btn-underline' },
                { cmd: 'strikeThrough', id: 'btn-strike' },
                { cmd: 'justifyLeft', id: 'btn-left' },
                { cmd: 'justifyCenter', id: 'btn-center' },
                { cmd: 'justifyRight', id: 'btn-right' },
                { cmd: 'insertUnorderedList', id: 'btn-ul' },
                { cmd: 'insertOrderedList', id: 'btn-ol' }
            ];

            buttons.forEach(({cmd, id}) => {
                const btn = document.getElementById(id);
                try {
                    if (document.queryCommandState(cmd)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                } catch(e) {
                    btn.classList.remove('active');
                }
            });
        }

        // Limpar formatação
        function clearFormat() {
            const editor = document.getElementById('editor');
            editor.focus();
            
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                const content = range.toString();
                
                if (content) {
                    const textNode = document.createTextNode(content);
                    range.deleteContents();
                    range.insertNode(textNode);
                    
                    selection.removeAllRanges();
                    const newRange = document.createRange();
                    newRange.selectNodeContents(textNode);
                    selection.addRange(newRange);
                }
            }
            
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Resetar estilos pendentes
            pendingStyles = {
                fontFamily: 'Inter',
                fontSize: '16px',
                color: '#f1f5f9'
            };
            currentFontSize = 16;
            editor.style.fontFamily = 'Inter';
            editor.style.fontSize = '16px';
            editor.style.color = '#f1f5f9';
            document.getElementById('fontSelect').value = 'Inter';
            
            saveCurrent();
        }

        function toggleMenu() {
            menuOpen = !menuOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            if (menuOpen) {
                sidebar.classList.add('show');
                overlay.classList.add('show');
            } else {
                closeMenu();
            }
        }

        function closeMenu() {
            menuOpen = false;
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        function newNote() {
            const note = {
                id: Date.now(),
                title: '',
                content: '',
                date: new Date().toISOString(),
                styles: {
                    bgColor: '#1e293b',
                    fontFamily: 'Inter',
                    fontSize: '16px',
                    color: '#f1f5f9'
                }
            };
            notes.unshift(note);
            saveNotes();
            renderList();
            selectNote(note.id);
            closeMenu();
        }

        function selectNote(id) {
            currentId = id;
            const note = notes.find(n => n.id === id);
            
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('editorWrapper').style.display = 'block';
            document.getElementById('deleteBtn').style.display = 'flex';
            
            document.getElementById('titleInput').value = note.title;
            document.getElementById('editor').innerHTML = note.content;
            
            // Restaurar estilos salvos
            if (note.styles) {
                const wrapper = document.getElementById('editorWrapper');
                wrapper.style.backgroundColor = note.styles.bgColor || '#1e293b';
                wrapper.style.color = note.styles.color || '#f1f5f9';
                
                const editor = document.getElementById('editor');
                editor.style.fontFamily = note.styles.fontFamily || 'Inter';
                editor.style.fontSize = note.styles.fontSize || '16px';
                editor.style.color = note.styles.color || '#f1f5f9';
                
                document.getElementById('titleInput').style.color = note.styles.color || '#f1f5f9';
                document.getElementById('fontSelect').value = note.styles.fontFamily || 'Inter';
                
                // Atualizar variáveis
                currentFont = note.styles.fontFamily || 'Inter';
                currentFontSize = parseInt(note.styles.fontSize) || 16;
                currentColor = note.styles.color || '#f1f5f9';
                pendingStyles = {
                    fontFamily: currentFont,
                    fontSize: note.styles.fontSize || '16px',
                    color: currentColor
                };
            }
            
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            
            updateStats();
            renderList();
            closeMenu();
        }

        function saveCurrent() {
            if (!currentId) return;
            
            const note = notes.find(n => n.id === currentId);
            note.title = document.getElementById('titleInput').value;
            note.content = document.getElementById('editor').innerHTML;
            note.date = new Date().toISOString();
            
            // Salvar estilos atuais
            const wrapper = document.getElementById('editorWrapper');
            const editor = document.getElementById('editor');
            note.styles = {
                bgColor: wrapper.style.backgroundColor || '#1e293b',
                fontFamily: editor.style.fontFamily || 'Inter',
                fontSize: editor.style.fontSize || '16px',
                color: editor.style.color || '#f1f5f9'
            };
            
            document.getElementById('saveStatus').textContent = 'Salvando...';
            setTimeout(() => {
                document.getElementById('saveStatus').textContent = 'Salvo';
            }, 500);
            
            updateStats();
        }

        function saveNotes() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        function renderList() {
            const list = document.getElementById('notesList');
            const search = document.getElementById('search').value.toLowerCase();
            
            const filtered = notes.filter(n => 
                n.title.toLowerCase().includes(search) || 
                n.content.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);font-size:14px">Nenhuma nota</div>';
                return;
            }

            list.innerHTML = filtered.map(note => {
                const preview = stripHtml(note.content).substring(0, 50) || 'Sem conteúdo';
                const date = new Date(note.date).toLocaleDateString('pt-BR');
                const active = note.id === currentId ? 'active' : '';
                
                return `
                    <div class="note-item ${active}" onclick="selectNote(${note.id})">
                        <div class="note-title">${note.title || 'Sem título'}</div>
                        <div class="note-preview">${preview}</div>
                        <div class="note-meta">
                            <span>${date}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchNotes() {
            renderList();
        }

        function deleteNote() {
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function confirmDelete() {
            notes = notes.filter(n => n.id !== currentId);
            saveNotes();
            currentId = null;
            
            document.getElementById('editorWrapper').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('deleteBtn').style.display = 'none';
            
            renderList();
            closeModal();
        }

        function toggleExport() {
            document.getElementById('exportMenu').classList.toggle('show');
        }

        function exportAs(type) {
            if (!currentId) return;
            const note = notes.find(n => n.id === currentId);
            
            let content, ext;
            switch(type) {
                case 'txt': 
                    content = `${note.title}\n\n${stripHtml(note.content)}`;
                    ext = 'txt';
                    break;
                case 'md':
                    content = `# ${note.title}\n\n${stripHtml(note.content)}`;
                    ext = 'md';
                    break;
                case 'html':
                    content = `<h1>${note.title}</h1>${note.content}`;
                    ext = 'html';
                    break;
            }
            
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${note.title || 'nota'}.${ext}`;
            a.click();
            
            document.getElementById('exportMenu').classList.remove('show');
        }

        function stripHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            return div.textContent || '';
        }

        function updateStats() {
            const text = document.getElementById('editor').innerText || '';
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('wordCount').textContent = `${words} palavras`;
            
            if (currentId) {
                const note = notes.find(n => n.id === currentId);
                document.getElementById('lastMod').textContent = new Date(note.date).toLocaleString('pt-BR');
            }
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
</html>
